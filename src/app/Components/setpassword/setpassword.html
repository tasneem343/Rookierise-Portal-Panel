    <hr class="line">


<div class="form-wrapper">
    <h4 class="text-header">Set Password</h4>
    <p class="text-center"> Enter your password To Set Your Account.</p>
  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
         <div class="form-group">
    <label>Email<span class="required">*</span></label>
    <input type="email" class="form-field" formControlName="email">
    
    <div *ngIf="passwordForm.get('email')?.invalid && (passwordForm.get('email')?.touched || passwordForm.get('email')?.dirty)">
      <small class="error" *ngIf="passwordForm.get('email')?.hasError('required')">
        Email is required.
      </small>
      <small class="error" *ngIf="passwordForm.get('email')?.hasError('email')">
        Please enter a valid email address.
      </small>
    </div>
  </div>
  <div class="form-group">
    <label>Password<span class="required">*</span></label>

    <div class="password-wrapper">

      <input
        [type]="showPassword ? 'text' : 'password'"
        class="form-field"
        formControlName="password">

    <span class="show-text" (click)="togglePassword()">SHOW</span>

    </div>

    <small class="error password-errors-inline" *ngIf="passwordErrorsInlineText">
      {{ passwordErrorsInlineText }}.
    </small>
  </div>
  <!-- Confirm Password -->
<div class="form-group">
  <label>Confirm Password<span class="required">*</span></label>
  <div class="password-wrapper">
    <input
      [type]="showConfirmPassword ? 'text' : 'password'"
      class="form-field"
      formControlName="confirmPassword">
    <span class="show-text" (click)="toggleConfirmPassword()">SHOW</span>
  </div>
  <div *ngIf="passwordForm.get('confirmPassword')?.invalid && (passwordForm.get('confirmPassword')?.touched || passwordForm.get('confirmPassword')?.dirty)">
    <small class="error" *ngIf="passwordForm.get('confirmPassword')?.hasError('required')">
      Confirm Password is required.
    </small>
  </div>
  <small class="error" *ngIf="passwordForm.errors?.['passwordMismatch'] && passwordForm.get('confirmPassword')?.dirty">
    Passwords do not match.
  </small>
</div>

<div class="form-actions">
  <button type="submit" [disabled]="passwordForm.invalid">Submit</button>
  <button type="button" class="cancel-btn" (click)="onCancel()">Cancel</button>
</div>
  </form>
</div>
