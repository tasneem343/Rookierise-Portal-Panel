<div class="body-div">
    <h4 class="text-header">Log in to your Rookierise account</h4>
    <p class="text-center">Please enter your email and password</p>
<div class="form-container">

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <div class="form-group">

      <div class="radio-group">
  <label>
    <input class="usertype" type="radio" value="company" formControlName="userType">
    Company
  </label>
  <label>
    <input class="usertype" type="radio" value="employee" formControlName="userType">
    Employee
  </label>
</div>
    </div>

   <div class="form-group">
  <label>Email<span class="required">*</span></label>
  <input type="email" class="form-field" formControlName="email" placeholder="Email">
  
  <div *ngIf="loginForm.get('email')?.invalid && (loginForm.get('email')?.touched || loginForm.get('email')?.dirty)">
    <small class="error" *ngIf="loginForm.get('email')?.hasError('required')">
      Email is required
    </small>
    <small class="error" *ngIf="loginForm.get('email')?.hasError('email')">
      Enter a valid email
    </small>
  </div>
</div>
<div class="form-group">
  <label>Password<span class="required">*</span></label>

  <div class="password-wrapper">

    <input
      [type]="showPassword ? 'text' : 'password'"
      class="form-field"
      formControlName="password"
      placeholder="Password">

    <i
      class="bi eye-icon"
      [class.bi-eye]="showPassword"
      [class.bi-eye-slash]="!showPassword"
      (click)="togglePassword()">
    </i>

  </div>

  <div *ngIf="loginForm.get('password')?.invalid && (loginForm.get('password')?.touched || loginForm.get('password')?.dirty)">
    <small class="error" *ngIf="loginForm.get('password')?.hasError('required')">
      Password is required
    </small>
  </div>
</div>
 <div class="forgot">
      <a routerLink="/forgot-password">Forget password?</a>
    </div>
    <button type="submit" [disabled]="loginForm.invalid">Login</button>

    <div class="remember">
      <input type="checkbox" formControlName="remember">
      <label>Remember me</label>
    </div>
   

  </form>
</div>

</div>
